version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gowir_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gowir_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nocodb:
    image: nocodb/nocodb:0.301.2
    depends_on:
      db:
        condition: service_healthy
    environment:
      NC_DB: "pg://db:5432?u=${POSTGRES_USER:-postgres}&p=${POSTGRES_PASSWORD:-postgres}&d=${POSTGRES_DB:-gowir_db}"
      NC_AUTH_JWT_SECRET: "${NC_AUTH_JWT_SECRET}"
    ports:
      - "${NOCODB_PORT:-8080}:8080"
    volumes:
      - nocodb_data:/usr/app/data/

volumes:
  pgdata:
  nocodb_data:
